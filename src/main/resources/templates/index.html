<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>Unit Converter</h1>
        <p class="subtitle">Select a category to get started</p>

        <div class="category-cards">
            <a href="/length" class="card">
                <div class="card-icon">📏</div>
                <div class="card-title">Length</div>
                <div class="card-desc">mm, cm, m, km, in, ft, yd, mi</div>
            </a>
            <a href="/weight" class="card">
                <div class="card-icon">⚖️</div>
                <div class="card-title">Weight</div>
                <div class="card-desc">mg, g, kg, oz, lb</div>
            </a>
            <a href="/temperature" class="card">
                <div class="card-icon">🌡️</div>
                <div class="card-title">Temperature</div>
                <div class="card-desc">Celsius, Fahrenheit, Kelvin</div>
            </a>
        </div>
    </div>
</body>
</html>
